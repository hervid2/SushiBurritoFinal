<div class="auth-layout">
    <div class="auth-layout__visual auth-layout__visual--change-password">
        <h1>Nueva Contraseña</h1>
        <h3>Tu seguridad es nuestra prioridad.</h3>
    </div>

    <div class="auth-layout__form">
        <div class="auth-card">
            <h2 class="auth-card__title">Cambiar Contraseña</h2>
            <p class="auth-card__description">Por favor, establece una contraseña nueva para poder acceder al sistema.</p>
            
            <form id="change-password-form" novalidate>
                <div class="form-group">
                    <label for="new-password" class="form-label">Nueva Contraseña:</label>
                    <input type="password" id="new-password" class="form-control" placeholder="Mínimo 6 caracteres" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="form-label">Confirmar Contraseña:</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Repite tu contraseña" required>
                </div>

                <button type="submit" class="btn btn--primary btn--block">Actualizar Contraseña</button>
            </form>

            <div class="auth-card__footer">
                <a href="#/login" class="auth-link">Cancelar y cerrar sesión</a>
            </div>
        </div>
    </div>
</div>
