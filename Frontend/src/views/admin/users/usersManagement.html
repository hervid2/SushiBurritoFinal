<div class="users-management-page">
    <div class="users-management__header">
        <h2 class="users-management__title">Gestión de Usuarios</h2>
        <div class="header-actions">
            <button class="btn btn--primary" id="add-user-btn">
                <i class="fas fa-plus"></i> Nuevo Usuario
            </button>
            <button class="btn btn--secondary" id="view-deleted-btn">
                <i class="fas fa-trash"></i> Ver Papelera
            </button>
        </div>
    </div>

    <section class="user-form-section" id="user-form-section" style="display: none; margin-bottom: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
        <h3><span id="form-title">Añadir Nuevo Usuario</span></h3>
        <form id="user-form" class="management-form">
            <input type="hidden" id="user-id">
            
            <div class="form-group">
                <label for="name" class="form-label">Nombre:</label>
                <input type="text" id="name" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email:</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="role" class="form-label">Rol:</label>
                <select id="role" class="form-control" required>
                    <option value="">Seleccione un rol...</option>
                    <option value="1">Administrador</option>
                    <option value="2">Mesero</option>
                    <option value="3">Cocinero</option>
                </select>
            </div>

            <div class="form-actions" style="margin-top: 15px;">
                <button type="button" class="btn btn--secondary" id="cancel-user-form-btn">Cancelar</button>
                <button type="submit" class="btn btn--success" id="save-user-btn">Guardar</button>
            </div>
        </form>
    </section>

    <div class="table-container">
        <table class="table" id="users-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>
